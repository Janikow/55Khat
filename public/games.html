  <script src="./script.js"></script>
  <script>
    const buttons      = document.querySelectorAll('.game-button[data-link]');
    const searchInput  = document.getElementById('gameSearch');
    const searchClear  = document.getElementById('searchClear');
    const filterChips  = document.querySelectorAll('.filter-chip');
    const noResults    = document.getElementById('noResults');
    const countEl      = document.getElementById('visibleCount');

    let activeFilter = 'all';

    function applyFilters() {
      const query = searchInput.value.trim().toLowerCase();
      let shown = 0;

      buttons.forEach(btn => {
        const name = btn.textContent.trim().toLowerCase();
        const tags = (btn.dataset.tags || '').toLowerCase();
        const matchSearch = !query || name.includes(query);
        const matchFilter = activeFilter === 'all' || tags.split(' ').includes(activeFilter);

        const visible = matchSearch && matchFilter;
        btn.style.display = visible ? '' : 'none';
        if (visible) shown++;
      });

      countEl.textContent = shown;
      noResults.classList.toggle('hidden', shown > 0);
      searchClear.classList.toggle('hidden', !query);
    }

    searchInput.addEventListener('input', applyFilters);

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchInput.focus();
      applyFilters();
    });

    filterChips.forEach(chip => {
      chip.addEventListener('click', () => {
        filterChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        activeFilter = chip.dataset.filter;
        applyFilters();
      });
    });

    // Init count
    countEl.textContent = buttons.length;
  </script>

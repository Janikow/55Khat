<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — Clever Education</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* ── Games page extensions ── */
    html, body {
      overflow: hidden auto;
    }

    .games-container {
      min-height: 100vh;
      padding: 32px 28px 48px;
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Page header ── */
    .games-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--c-border);
      position: relative;
    }

    .games-header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 60%;
      height: 1px;
      background: linear-gradient(90deg, var(--c-accent), transparent);
      box-shadow: var(--glow-sm);
    }

    .games-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--c-accent);
      text-shadow: var(--glow-md);
    }

    .games-title span {
      color: var(--c-text-dim);
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 2px;
      margin-left: 12px;
    }

    .games-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .game-count {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--c-text-dim);
      letter-spacing: 2px;
    }

    .game-count strong {
      color: var(--c-accent2);
      text-shadow: 0 0 8px var(--c-accent2);
    }

    /* ── Search bar ── */
    .search-wrap {
      position: relative;
      width: 240px;
    }

    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--c-accent-dim);
      font-size: 13px;
      pointer-events: none;
    }

    #gameSearch {
      width: 100%;
      background: rgba(0, 210, 255, 0.04);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-sm);
      color: var(--c-text);
      padding: 8px 10px 8px 30px;
      font-family: var(--font-mono);
      font-size: 12px;
      outline: none;
      transition: var(--t-fast);
      caret-color: var(--c-accent);
      letter-spacing: 1px;
    }

    #gameSearch::placeholder { color: var(--c-text-dim); }

    #gameSearch:focus {
      border-color: var(--c-accent);
      background: rgba(0, 210, 255, 0.07);
      box-shadow: var(--glow-sm);
    }

    /* ── Category filters ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 5px 14px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid var(--c-border);
      border-radius: 20px;
      background: transparent;
      color: var(--c-text-dim);
      cursor: pointer;
      transition: var(--t-fast);
    }

    .filter-chip:hover,
    .filter-chip.active {
      border-color: var(--c-accent);
      color: var(--c-accent);
      background: rgba(0,210,255,0.06);
      box-shadow: var(--glow-sm);
    }

    /* ── Game grid ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .game-button {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 10px;
      background: var(--c-panel);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 0.5px;
      text-align: center;
      cursor: pointer;
      transition: var(--t-fast);
      overflow: hidden;
      min-height: 54px;
      line-height: 1.3;
      word-break: break-word;
      hyphens: auto;
      backdrop-filter: blur(4px);
      animation: fadeUp var(--t-slow) both;
    }

    /* Staggered animation for grid items */
    .game-button:nth-child(1)  { animation-delay: 0.00s; }
    .game-button:nth-child(2)  { animation-delay: 0.02s; }
    .game-button:nth-child(3)  { animation-delay: 0.04s; }
    .game-button:nth-child(4)  { animation-delay: 0.06s; }
    .game-button:nth-child(5)  { animation-delay: 0.08s; }
    .game-button:nth-child(6)  { animation-delay: 0.10s; }
    .game-button:nth-child(7)  { animation-delay: 0.12s; }
    .game-button:nth-child(8)  { animation-delay: 0.14s; }
    .game-button:nth-child(9)  { animation-delay: 0.16s; }
    .game-button:nth-child(10) { animation-delay: 0.18s; }
    .game-button:nth-child(n+11) { animation-delay: 0.20s; }

    /* Corner decorations on hover */
    .game-button::before,
    .game-button::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      opacity: 0;
      transition: var(--t-fast);
    }

    .game-button::before {
      top: 4px; left: 4px;
      border-top: 1.5px solid var(--c-accent);
      border-left: 1.5px solid var(--c-accent);
    }

    .game-button::after {
      bottom: 4px; right: 4px;
      border-bottom: 1.5px solid var(--c-accent);
      border-right: 1.5px solid var(--c-accent);
    }

    .game-button:hover {
      border-color: var(--c-accent-dim);
      background: rgba(0, 210, 255, 0.07);
      color: var(--c-accent);
      text-shadow: var(--glow-sm);
      transform: translateY(-2px);
      box-shadow: var(--glow-sm), 0 8px 24px rgba(0,0,0,0.4);
    }

    .game-button:hover::before,
    .game-button:hover::after {
      opacity: 1;
    }

    .game-button:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* ── Empty state ── */
    .no-results {
      display: none;
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--c-text-dim);
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 2px;
    }

    .no-results::before {
      content: '[ NO RESULTS ]';
      display: block;
      font-family: var(--font-display);
      font-size: 16px;
      color: var(--c-accent-dim);
      margin-bottom: 10px;
      letter-spacing: 4px;
    }

    .no-results.visible { display: block; }

    /* ── Back link ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--c-text-dim);
      text-decoration: none;
      text-transform: uppercase;
      transition: var(--t-fast);
      margin-bottom: 20px;
    }

    .back-link::before {
      content: '←';
      color: var(--c-accent);
    }

    .back-link:hover {
      color: var(--c-accent);
    }

    @media (max-width: 600px) {
      .games-container { padding: 20px 14px 40px; }
      .games-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .search-wrap { width: 100%; }
      .game-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
    }
  </style>
</head>

  <script>
    const buttons = document.querySelectorAll('.game-button[data-link]');
    const searchInput = document.getElementById('gameSearch');
    const filterChips = document.querySelectorAll('.filter-chip');
    const noResults = document.getElementById('noResults');
    const visibleCount = document.getElementById('visibleCount');

    let currentFilter = 'all';
    let currentSearch = '';

    // Navigate on click (using existing script.js data-link pattern)
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const link = btn.getAttribute('data-link');
        if (link) window.location.href = link;
      });
    });

    function applyFilters() {
      let shown = 0;

      buttons.forEach(btn => {
        const name = btn.textContent.toLowerCase();
        const tags = (btn.getAttribute('data-tags') || '').toLowerCase();

        const matchesSearch = !currentSearch || name.includes(currentSearch);
        const matchesFilter = currentFilter === 'all' || tags.includes(currentFilter);

        if (matchesSearch && matchesFilter) {
          btn.style.display = '';
          shown++;
        } else {
          btn.style.display = 'none';
        }
      });

      visibleCount.textContent = shown;
      noResults.classList.toggle('visible', shown === 0);
    }

    searchInput.addEventListener('input', () => {
      currentSearch = searchInput.value.trim().toLowerCase();
      applyFilters();
    });

    filterChips.forEach(chip => {
      chip.addEventListener('click', () => {
        filterChips.forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentFilter = chip.getAttribute('data-filter');
        applyFilters();
      });
    });

    // Init count
    visibleCount.textContent = buttons.length;
  </script>
